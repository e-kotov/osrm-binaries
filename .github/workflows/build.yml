name: Build and Release OSRM Binaries

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Upstream OSRM tag to build (e.g., v26.7.1)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.version_tag }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            artifact_name: osrm-${{ inputs.version_tag }}-linux-x64-Release
          - os: ubuntu-24.04-arm
            artifact_name: osrm-${{ inputs.version_tag }}-linux-arm64-Release
          - os: macos-13
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-x64-Release
          - os: macos-14
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-arm64-Release
          - os: windows-2019
            artifact_name: osrm-${{ inputs.version_tag }}-win32-x64-Release

    steps:
      - name: Checkout upstream OSRM
        uses: actions/checkout@v4
        with:
          repository: 'Project-OSRM/osrm-backend'
          ref: ${{ inputs.version_tag }}
          path: 'osrm-backend'

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake pkg-config \
            libbz2-dev libstxxl-dev libstxxl1v5 libxml2-dev \
            libzip-dev libboost-all-dev lua5.2 liblua5.2-dev libtbb-dev
            
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake boost libzip stxxl lua tbb

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install bzip2 boost-system boost-thread boost-iostreams boost-date-time boost-filesystem boost-program-options boost-regex boost-test expat stxxl lua tbb --triplet x64-windows

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd osrm-backend
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_NODE_BINDINGS=Off
          make -j$(nproc || sysctl -n hw.ncpu)
          
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd osrm-backend
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_NODE_BINDINGS=Off -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build . --config Release --parallel 4

      - name: Package Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/${{ matrix.artifact_name }}
          cp osrm-backend/build/osrm-extract package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-routed package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-contract package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-customize package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-partition package/${{ matrix.artifact_name }}/
          cp -r osrm-backend/profiles package/${{ matrix.artifact_name }}/
          cd package
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package/${{ matrix.artifact_name }}
          cp osrm-backend/build/Release/osrm-extract.exe package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/Release/osrm-routed.exe package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/Release/osrm-contract.exe package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/Release/osrm-customize.exe package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/Release/osrm-partition.exe package/${{ matrix.artifact_name }}/
          cp -r osrm-backend/profiles package/${{ matrix.artifact_name }}/
          cp "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll" package/${{ matrix.artifact_name }}/
          cd package
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          files: package/${{ matrix.artifact_name }}.tar.gz
