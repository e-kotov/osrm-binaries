name: Build and Release OSRM Binaries

run-name: Build ${{ inputs.version_tag }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version_tag }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Upstream OSRM tag to build (e.g., v26.7.1)'
        required: true
        type: string

permissions:
  actions: write
  contents: read

env:
  VCPKG_BINARY_CACHE_DIR: ${{ github.workspace }}\vcpkg-binary-cache
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg-pinned
  VCPKG_COMMIT: 42e4e33e1505c9f47b58c21e0f557c1571b751ee

jobs:
  build:
    name: Build ${{ github.event.inputs.version_tag || github.ref_name }} on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-linux-x64-Release
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact_name: osrm-${{ inputs.version_tag }}-linux-arm64-Release
          - os: macos-15
            arch: arm64
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-arm64-Release
          - os: macos-15-intel
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-x64-Release
          - os: windows-2022
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-win32-x64-Release

    steps:
      - name: Validate version_tag
        run: |
          if [[ ! "${{ inputs.version_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version_tag format: ${{ inputs.version_tag }}"
            exit 1
          fi
        shell: bash

      - name: Checkout upstream OSRM
        uses: actions/checkout@v4
        with:
          repository: 'Project-OSRM/osrm-backend'
          ref: ${{ inputs.version_tag }}
          path: 'osrm-backend'

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git cmake pkg-config \
            libbz2-dev libstxxl-dev libstxxl1v5 libxml2-dev \
            libzip-dev libboost-all-dev libtbb-dev libarchive-dev libfmt-dev rapidjson-dev libprotozero-dev libosmium2-dev

      - name: Install sol2, flatbuffers, vtzero, lua5.4 (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -R -L -O https://www.lua.org/ftp/lua-5.4.6.tar.gz
          tar zxf lua-5.4.6.tar.gz
          cd lua-5.4.6
          make all test
          sudo make install
          cd ..
          sudo ldconfig
          git clone --depth 1 -b v3.3.1 https://github.com/ThePhD/sol2.git /tmp/sol2
          cd /tmp/sol2
          mkdir build && cd build
          cmake ..
          sudo cmake --install .

          git clone --depth 1 -b v23.5.26 https://github.com/google/flatbuffers.git /tmp/flatbuffers
          cd /tmp/flatbuffers
          mkdir build && cd build
          cmake .. -DFLATBUFFERS_BUILD_TESTS=OFF -DFLATBUFFERS_BUILD_SHAREDLIB=OFF
          cmake --build .
          sudo cmake --install .

          git clone --depth 1 -b v1.1.0 https://github.com/mapbox/vtzero.git /tmp/vtzero
          sudo cp -r /tmp/vtzero/include/vtzero /usr/local/include/

      - name: Patch OSRM Source (Fix std::atomic_ref, GCC 11 visit, MSVC count)
        if: runner.os != 'Windows'
        run: |
          python3 -c "
          import sys, glob
          with open('osrm-backend/CMakeLists.txt', 'r') as f:
              c = f.read()
          c = c.replace(' /opt/homebrew', '')
          with open('osrm-backend/CMakeLists.txt', 'w') as f:
              f.write(c)
          with open('osrm-backend/include/util/packed_vector.hpp', 'r') as f:
              content = f.read()
          content = content.replace('std::atomic_ref<uint64_t> atomic_ref(*ptr);', 'return __atomic_compare_exchange_n(ptr, &old_value, new_value, false, __ATOMIC_SEQ_CST, __ATOMIC_SEQ_CST);')
          content = content.replace('return atomic_ref.compare_exchange_strong(old_value, new_value, std::memory_order_seq_cst);', '')
          with open('osrm-backend/include/util/packed_vector.hpp', 'w') as f:
              f.write(content)
          with open('osrm-backend/include/util/json_renderer.hpp', 'r') as f:
              c = f.read()
          c = c.replace('std::visit([&](auto&& arg) { Renderer(out)(arg); }, it->second);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, it->second);')
          c = c.replace('std::visit([&](auto&& arg) { Renderer(out)(arg); }, *it);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, *it);')
          c = c.replace('std::visit<void>(Renderer(out), it->second);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, it->second);')
          c = c.replace('std::visit<void>(Renderer(out), *it);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, *it);')
          c = c.replace('std::visit(Renderer(out), it->second);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, it->second);')
          c = c.replace('std::visit(Renderer(out), *it);', 'std::visit([this](auto&& arg) -> int { (*this)(arg); return 0; }, *it);')
          with open('osrm-backend/include/util/json_renderer.hpp', 'w') as f:
              f.write(c)
          for file in glob.glob('osrm-backend/src/**/*.cpp', recursive=True):
              with open(file, 'r') as f:
                  c = f.read()
              c = c.replace('option_variables.contains(', 'option_variables.count(')
              with open(file, 'w') as f:
                  f.write(c)
          for file in glob.glob('osrm-backend/**/*.cpp', recursive=True) + glob.glob('osrm-backend/**/*.hpp', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: c = f.read()
                  changed = False
                  if 'boost/filesystem/convenience.hpp' in c:
                      c = c.replace('boost/filesystem/convenience.hpp', 'boost/filesystem.hpp')
                      changed = True
                  if 'boost/geometry/multi/geometries/multi_linestring.hpp' in c:
                      c = c.replace('boost/geometry/multi/geometries/multi_linestring.hpp', 'boost/geometry/geometries/multi_linestring.hpp')
                      changed = True
                  if changed:
                      with open(file, 'w', encoding='utf-8') as f: f.write(c)
              except: pass
          for file in glob.glob('osrm-backend/**/*.cmake', recursive=True) + glob.glob('osrm-backend/**/CMakeLists.txt', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: c = f.read()
                  if '-Werror' in c:
                      with open(file, 'w', encoding='utf-8') as f: f.write(c.replace('-Werror', ''))
              except: pass
          import re
          for file in glob.glob('osrm-backend/generated/include/**/*.h', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: c = f.read()
                  if 'static_assert(FLATBUFFERS_VERSION_' in c:
                      c = re.sub(r'static_assert\(FLATBUFFERS_VERSION_MAJOR.*?;\n?', '', c, flags=re.DOTALL)
                      with open(file, 'w', encoding='utf-8') as f: f.write(c)
              except: pass
          try:
              with open('osrm-backend/CMakeLists.txt', 'r', encoding='utf-8') as f: c = f.read()
              c = re.sub(r'set\(BOOST_COMPONENTS(.*?)\)', lambda m: 'set(BOOST_COMPONENTS' + re.sub(r'\bsystem\b', '', m.group(1)) + ')', c)
              c = re.sub(r'find_package\(Boost 1\.\d+ REQUIRED', 'find_package(Boost 1.60 REQUIRED', c)
              c = re.sub(r'cmake_policy\(SET CMP0048 OLD\)', '', c)
              c = re.sub(r'find_package\(Lua 5\.2 REQUIRED\)', 'find_package(Lua 5.4 REQUIRED)', c)
              c = c.replace('project(OSRM C CXX)', 'project(OSRM C CXX)\nif(APPLE)\ninclude_directories(/opt/homebrew/include /usr/local/include)\nendif()')
              c = c.replace('foreach(engine_lib ${ENGINE_LIBRARIES})', 'if(NOT WIN32)\nforeach(engine_lib ${ENGINE_LIBRARIES})')
              c = c.replace('install(FILES ${PROJECT_BINARY_DIR}/libosrm.pc DESTINATION ${PKGCONFIG_LIBRARY_DIR}/pkgconfig)', 'install(FILES ${PROJECT_BINARY_DIR}/libosrm.pc DESTINATION ${PKGCONFIG_LIBRARY_DIR}/pkgconfig)\nendif()')
              with open('osrm-backend/CMakeLists.txt', 'w', encoding='utf-8') as f: f.write(c)
          except: pass
          try:
              with open('osrm-backend/include/server/connection.hpp', 'r', encoding='utf-8') as f: h = f.read()
              h = '#include <chrono>\n#include <boost/asio/steady_timer.hpp>\n' + h
              h = h.replace('boost::asio::deadline_timer', 'boost::asio::steady_timer')
              with open('osrm-backend/include/server/connection.hpp', 'w', encoding='utf-8') as f: f.write(h)
          except: pass
          try:
              with open('osrm-backend/src/server/connection.cpp', 'r', encoding='utf-8') as f: c2 = f.read()
              c2 = '#include <chrono>\n' + c2
              c2 = c2.replace('timer.expires_from_now(boost::posix_time::seconds(keepalive_timeout))', 'timer.expires_after(std::chrono::seconds(keepalive_timeout))')
              c2 = c2.replace('timer.expires_from_now(boost::posix_time::seconds(0))', 'timer.expires_after(std::chrono::seconds(0))')
              with open('osrm-backend/src/server/connection.cpp', 'w', encoding='utf-8') as f: f.write(c2)
          except: pass
          try:
              with open('osrm-backend/include/server/server.hpp', 'r', encoding='utf-8') as f: s = f.read()
              s = '#include <boost/version.hpp>\n' + s
              old_resolve = 'boost::asio::ip::tcp::resolver::query query(address, port_string);\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);'
              new_resolve = '#if BOOST_VERSION >= 106600\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(address, port_string).begin();\n#else\n        boost::asio::ip::tcp::resolver::query query(address, port_string);\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);\n#endif'
              s = s.replace(old_resolve, new_resolve)
              # In case the newlines or formatting was slightly different:
              s = s.replace('boost::asio::ip::tcp::resolver::query query(address, port_string);', '#if BOOST_VERSION >= 106600\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(address, port_string).begin();\n#else\n        boost::asio::ip::tcp::resolver::query query(address, port_string);')
              s = s.replace('boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);', 'boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);\n#endif')
              with open('osrm-backend/include/server/server.hpp', 'w', encoding='utf-8') as f: f.write(s)
          except: pass
          for file in glob.glob('osrm-backend/**/sol.hpp', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: s2 = f.read()
                  s2 = s2.replace('LUA_VERSION_NUM > 504', 'LUA_VERSION_NUM > 505')
                  with open(file, 'w', encoding='utf-8') as f: f.write(s2)
              except: pass
          "
          rm -f osrm-backend/cmake/FindLua.cmake
          find osrm-backend -type f -name '*.hpp' -o -name '*.cpp' | xargs -I {} sed -i.bak '1i\
          #include <cstdint>\
          #include <string>\
          #include <vector>\
          #include <stdexcept>\
          #include <iostream>\
          #include <memory>\
          #include <utility>\
          #include <chrono>\
          ' {}
          find osrm-backend -type f -name 'CMakeLists.txt' | xargs -I {} sed -i.bak 's/Boost::regex//g' {}
          echo 'set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-error -Wno-deprecated-copy")' >> osrm-backend/CMakeLists.txt

      - name: Patch OSRM Source (Windows)
        if: runner.os == 'Windows'
        run: |
          python3 -c "
          import sys, glob
          for file in glob.glob('osrm-backend/**/*.cpp', recursive=True) + glob.glob('osrm-backend/**/*.hpp', recursive=True):
              with open(file, 'r', encoding='utf-8', errors='ignore') as f:
                  c = f.read()
              c = '#include <cstdint>\n#include <chrono>\n' + c
              if 'option_variables.contains(' in c:
                  c = c.replace('option_variables.contains(', 'option_variables.count(')
              if 'boost/filesystem/convenience.hpp' in c:
                  c = c.replace('boost/filesystem/convenience.hpp', 'boost/filesystem.hpp')
              if 'boost/geometry/multi/geometries/multi_linestring.hpp' in c:
                  c = c.replace('boost/geometry/multi/geometries/multi_linestring.hpp', 'boost/geometry/geometries/multi_linestring.hpp')
              with open(file, 'w', encoding='utf-8') as f:
                  f.write(c)
          for file in glob.glob('osrm-backend/**/CMakeLists.txt', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: c = f.read()
                  c = c.replace('Boost::regex', '')
                  with open(file, 'w', encoding='utf-8') as f: f.write(c)
              except: pass
          try:
              with open('osrm-backend/include/server/connection.hpp', 'r', encoding='utf-8') as f: h = f.read()
              h = '#include <chrono>\n#include <boost/asio/steady_timer.hpp>\n' + h
              h = h.replace('boost::asio::deadline_timer', 'boost::asio::steady_timer')
              with open('osrm-backend/include/server/connection.hpp', 'w', encoding='utf-8') as f: f.write(h)
          except: pass
          try:
              with open('osrm-backend/src/server/connection.cpp', 'r', encoding='utf-8') as f: c2 = f.read()
              c2 = '#include <chrono>\n' + c2
              c2 = c2.replace('timer.expires_from_now(boost::posix_time::seconds(keepalive_timeout))', 'timer.expires_after(std::chrono::seconds(keepalive_timeout))')
              c2 = c2.replace('timer.expires_from_now(boost::posix_time::seconds(0))', 'timer.expires_after(std::chrono::seconds(0))')
              with open('osrm-backend/src/server/connection.cpp', 'w', encoding='utf-8') as f: f.write(c2)
          except: pass
          try:
              with open('osrm-backend/include/server/server.hpp', 'r', encoding='utf-8') as f: s = f.read()
              s = '#include <boost/version.hpp>\n' + s
              old_resolve = 'boost::asio::ip::tcp::resolver::query query(address, port_string);\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);'
              new_resolve = '#if BOOST_VERSION >= 106600\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(address, port_string).begin();\n#else\n        boost::asio::ip::tcp::resolver::query query(address, port_string);\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);\n#endif'
              s = s.replace(old_resolve, new_resolve)
              s = s.replace('boost::asio::ip::tcp::resolver::query query(address, port_string);', '#if BOOST_VERSION >= 106600\n        boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(address, port_string).begin();\n#else\n        boost::asio::ip::tcp::resolver::query query(address, port_string);')
              s = s.replace('boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);', 'boost::asio::ip::tcp::endpoint endpoint = *resolver.resolve(query);\n#endif')
              with open('osrm-backend/include/server/server.hpp', 'w', encoding='utf-8') as f: f.write(s)
          except: pass
          for file in glob.glob('osrm-backend/**/sol.hpp', recursive=True):
              try:
                  with open(file, 'r', encoding='utf-8') as f: s2 = f.read()
                  s2 = s2.replace('LUA_VERSION_NUM > 504', 'LUA_VERSION_NUM > 505')
                  with open(file, 'w', encoding='utf-8') as f: f.write(s2)
              except: pass
          "


      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.arch }}" == "x64" ]; then
            if [ ! -x /usr/local/bin/brew ]; then
              arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            fi
            arch -x86_64 /usr/local/bin/brew install cmake pkg-config boost libzip libstxxl lua@5.4 tbb libarchive fmt rapidjson sol2 protozero vtzero libosmium
          else
            brew install cmake pkg-config boost libzip libstxxl lua@5.4 tbb libarchive fmt rapidjson sol2 protozero vtzero libosmium
          fi

          if [[ "${{ inputs.version_tag }}" == v5.* ]]; then
            sudo rm -rf /usr/local/include/flatbuffers /usr/local/lib/libflatbuffers* /usr/local/lib/cmake/flatbuffers /opt/homebrew/include/flatbuffers /opt/homebrew/lib/libflatbuffers* /opt/homebrew/lib/cmake/flatbuffers
          else
            if [ "${{ matrix.arch }}" == "x64" ]; then
              arch -x86_64 /usr/local/bin/brew install flatbuffers
            else
              brew install flatbuffers
            fi
          fi

      - name: Set up pinned vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          cd $env:VCPKG_ROOT
          git checkout $env:VCPKG_COMMIT
          .\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          "VCPKG_INSTALLATION_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV

      - name: Detect vcpkg cache key (Windows)
        id: vcpkg-cache-key
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd $env:VCPKG_ROOT
          $vcpkgHead = git rev-parse HEAD
          $luaPortCommit = ""
          $lines = git log --format="%H %s" -- ports/lua
          foreach ($line in $lines) {
              if ($line -match "5\.4") {
                  $luaPortCommit = $line.Split(" ", 2)[0]
                  break
              }
          }
          if (!$luaPortCommit) {
              throw "Could not find Lua 5.4 port commit in pinned vcpkg checkout"
          }
          $manifestFiles = @(
              "$env:GITHUB_WORKSPACE\osrm-backend\vcpkg.json",
              "$env:GITHUB_WORKSPACE\osrm-backend\vcpkg-configuration.json"
          ) | Where-Object { Test-Path $_ }
          if ($manifestFiles.Count -gt 0) {
              $hashInput = ""
              foreach ($file in ($manifestFiles | Sort-Object)) {
                  $hashInput += "$(Split-Path -Leaf $file)`n"
                  $hashInput += Get-Content -Raw $file
                  $hashInput += "`n"
              }
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($hashInput)
              $manifestHash = [BitConverter]::ToString($sha256.ComputeHash($bytes)).Replace("-", "").ToLowerInvariant()
          } else {
              $manifestHash = "no-manifest"
          }
          "vcpkg_head=$vcpkgHead" >> $env:GITHUB_OUTPUT
          "lua_port_commit=$luaPortCommit" >> $env:GITHUB_OUTPUT
          "manifest_hash=$manifestHash" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg binary cache (Windows)
        if: runner.os == 'Windows'
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_DIR }}
          key: windows-vcpkg-binary-${{ steps.vcpkg-cache-key.outputs.vcpkg_head }}-${{ steps.vcpkg-cache-key.outputs.lua_port_commit }}-${{ steps.vcpkg-cache-key.outputs.manifest_hash }}-x64-windows-osrm-deps-v2
          restore-keys: |
            windows-vcpkg-binary-${{ steps.vcpkg-cache-key.outputs.vcpkg_head }}-${{ steps.vcpkg-cache-key.outputs.lua_port_commit }}-${{ steps.vcpkg-cache-key.outputs.manifest_hash }}-x64-windows-
            windows-vcpkg-binary-${{ steps.vcpkg-cache-key.outputs.vcpkg_head }}-${{ steps.vcpkg-cache-key.outputs.lua_port_commit }}-x64-windows-
            windows-vcpkg-binary-${{ steps.vcpkg-cache-key.outputs.vcpkg_head }}-${{ steps.vcpkg-cache-key.outputs.lua_port_commit }}-
            windows-vcpkg-binary-${{ steps.vcpkg-cache-key.outputs.vcpkg_head }}-

      - name: Configure vcpkg binary cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_BINARY_CACHE_DIR | Out-Null
          "VCPKG_BINARY_SOURCES=clear;files,$env:VCPKG_BINARY_CACHE_DIR,readwrite" >> $env:GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd $env:VCPKG_ROOT
          $commit = "${{ steps.vcpkg-cache-key.outputs.lua_port_commit }}"
          if ($commit) {
              Write-Host "Reverting lua port to commit $commit"
              git checkout $commit -- ports/lua
              if (Test-Path "versions/l/lua.json") {
                  git checkout $commit -- versions/l/lua.json
              }
          }
          .\vcpkg.exe install bzip2 boost expat stxxl lua tbb libarchive libzip --triplet x64-windows

      "- name: Prewarm vcpkg manifest dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Skip manifest prewarm if a vcpkg binary cache was restored (directory contains files).
          $cacheDir = $env:VCPKG_BINARY_CACHE_DIR
          if (Test-Path $cacheDir) {
              $anyFile = Get-ChildItem -Path $cacheDir -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($anyFile) {
                  Write-Host "Binary cache directory '$cacheDir' contains files; skipping manifest prewarm."
                  exit 0
              }
          }
          $manifestRoot = Join-Path $env:GITHUB_WORKSPACE "osrm-backend"
          $manifestFile = Join-Path $manifestRoot "vcpkg.json"
          if (!(Test-Path $manifestFile)) {
              Write-Host "No vcpkg manifest found; skipping manifest prewarm."
              exit 0
          }
          $buildDir = Join-Path $manifestRoot "build"
          $installRoot = Join-Path $buildDir "vcpkg_installed"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
              --triplet x64-windows `
              --x-manifest-root="$manifestRoot" `
              --x-install-root="$installRoot"
"
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export CXXFLAGS="-Wno-error -Wno-deprecated-copy"
            export CFLAGS="-Wno-error"
              export LUA_DIR="/usr/local/opt/lua@5.4"
          else
            export CXXFLAGS="$CXXFLAGS -Wno-error -Wno-deprecated-copy"
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            if [ "${{ matrix.arch }}" == "x64" ]; then
              unset LDFLAGS
              unset CPPFLAGS
              unset C_INCLUDE_PATH
              unset CPLUS_INCLUDE_PATH
              export PATH=$(echo $PATH | sed -e 's|/opt/homebrew/bin:||g' -e 's|/opt/homebrew/sbin:||g')
              export PATH="/usr/local/bin:/usr/local/sbin:$PATH"
              export PKG_CONFIG_PATH="/usr/local/opt/lua@5.4/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig"
              export CPATH="/usr/local/opt/libarchive/include:/usr/local/include"
              export LIBRARY_PATH="/usr/local/opt/libarchive/lib:/usr/local/lib"
              export MACOSX_DEPLOYMENT_TARGET="14.0"
              CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DLibArchive_INCLUDE_DIR=/usr/local/opt/libarchive/include -DLibArchive_LIBRARY=/usr/local/opt/libarchive/lib/libarchive.dylib -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_IGNORE_PATH=/opt/homebrew -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DLUA_INCLUDE_DIR=/usr/local/opt/lua@5.4/include/lua -DLUA_LIBRARY=/usr/local/opt/lua@5.4/lib/liblua.dylib"
            else
              export CPATH="/opt/homebrew/opt/libarchive/include:/opt/homebrew/include:$CPATH"
              export LIBRARY_PATH="/opt/homebrew/opt/libarchive/lib:/opt/homebrew/lib:$LIBRARY_PATH"
              export MACOSX_DEPLOYMENT_TARGET="14.0"
              CMAKE_ARGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DLibArchive_INCLUDE_DIR=$(brew --prefix libarchive)/include -DLibArchive_LIBRARY=$(brew --prefix libarchive)/lib/libarchive.dylib -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 -DLUA_INCLUDE_DIR=$(brew --prefix lua@5.4)/include/lua -DLUA_LIBRARY=$(brew --prefix lua@5.4)/lib/liblua.dylib"
            fi
          fi
          cd osrm-backend
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DENABLE_NODE_BINDINGS=Off $CMAKE_ARGS
          make -j$(nproc || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd osrm-backend
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cd build
          $vsdev = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"
          if (!(Test-Path $vsdev)) {
            $vsdev = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\Common7\Tools\VsDevCmd.bat"
          }
          if (!(Test-Path $vsdev)) {
            $vsdev = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat"
          }
          if (!(Test-Path $vsdev)) {
            throw "Could not find VsDevCmd.bat for Ninja/MSVC build"
          }
          @(
            "@echo on"
            "call `"$vsdev`" -arch=x64"
            "cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DENABLE_NODE_BINDINGS=Off -DCMAKE_TOOLCHAIN_FILE=`"$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake`" -DVCPKG_TARGET_TRIPLET=x64-windows"
            "cmake --build . --parallel 4"
          ) | Set-Content -Path "build-ninja.cmd"
          cmd.exe /c build-ninja.cmd
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p package/${{ matrix.artifact_name }}
          cp osrm-backend/build/osrm-extract package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-routed package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-contract package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-customize package/${{ matrix.artifact_name }}/
          cp osrm-backend/build/osrm-partition package/${{ matrix.artifact_name }}/
          cp -r osrm-backend/profiles package/${{ matrix.artifact_name }}/

          # Bundle TBB, Boost and patch RPATH for macOS
          if [ "$RUNNER_OS" == "macOS" ]; then
            if [ "${{ matrix.arch }}" == "x64" ]; then
              cp /usr/local/opt/tbb/lib/libtbb*.dylib package/${{ matrix.artifact_name }}/ || true
              cp /usr/local/opt/boost/lib/libboost_{program_options,filesystem,iostreams,system,thread,chrono,date_time,regex,random,atomic,container}*.dylib package/${{ matrix.artifact_name }}/ || true
              cp /usr/local/opt/libarchive/lib/libarchive*.dylib package/${{ matrix.artifact_name }}/ || true
              cp /usr/local/opt/lua@5.4/lib/liblua*.dylib package/${{ matrix.artifact_name }}/ || true
            else
              cp $(brew --prefix tbb)/lib/libtbb*.dylib package/${{ matrix.artifact_name }}/ || true
              cp $(brew --prefix boost)/lib/libboost_{program_options,filesystem,iostreams,system,thread,chrono,date_time,regex,random,atomic,container}*.dylib package/${{ matrix.artifact_name }}/ || true
              cp $(brew --prefix libarchive)/lib/libarchive*.dylib package/${{ matrix.artifact_name }}/ || true
              cp $(brew --prefix lua@5.4)/lib/liblua*.dylib package/${{ matrix.artifact_name }}/ || true
            fi

            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              install_name_tool -add_rpath @loader_path package/${{ matrix.artifact_name }}/$exe || true
              for lib in program_options filesystem iostreams system thread chrono date_time regex random atomic container; do
                install_name_tool -change "/opt/homebrew/opt/boost/lib/libboost_${lib}.dylib" "@rpath/libboost_${lib}.dylib" package/${{ matrix.artifact_name }}/$exe || true
                install_name_tool -change "/usr/local/opt/boost/lib/libboost_${lib}.dylib" "@rpath/libboost_${lib}.dylib" package/${{ matrix.artifact_name }}/$exe || true
              done
              install_name_tool -change "/opt/homebrew/opt/tbb/lib/libtbb.12.dylib" "@rpath/libtbb.12.dylib" package/${{ matrix.artifact_name }}/$exe || true
              install_name_tool -change "/usr/local/opt/tbb/lib/libtbb.12.dylib" "@rpath/libtbb.12.dylib" package/${{ matrix.artifact_name }}/$exe || true
              install_name_tool -change "/opt/homebrew/opt/libarchive/lib/libarchive.13.dylib" "@rpath/libarchive.13.dylib" package/${{ matrix.artifact_name }}/$exe || true
              install_name_tool -change "/usr/local/opt/libarchive/lib/libarchive.13.dylib" "@rpath/libarchive.13.dylib" package/${{ matrix.artifact_name }}/$exe || true
              install_name_tool -change "/opt/homebrew/opt/lua@5.4/lib/liblua.dylib" "@rpath/liblua.dylib" package/${{ matrix.artifact_name }}/$exe || true
              install_name_tool -change "/usr/local/opt/lua@5.4/lib/liblua.dylib" "@rpath/liblua.dylib" package/${{ matrix.artifact_name }}/$exe || true
            done

            cd package/${{ matrix.artifact_name }}
            shopt -s nullglob

            # Recursively bundle Homebrew dylib dependencies and rewrite them to
            # load from the package directory. This catches transitive deps such
            # as libarchive -> xz/zstd/lz4/libb2.
            while true; do
              added=0
              for target in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition *.dylib; do
                [ -f "$target" ] || continue
                while IFS= read -r dep; do
                  dep_name="$(basename "$dep")"
                  if [ ! -f "$dep_name" ]; then
                    cp "$dep" "$dep_name"
                    added=1
                  fi
                  install_name_tool -change "$dep" "@loader_path/$dep_name" "$target" || true
                done < <(otool -L "$target" | awk '/\/opt\/homebrew\/|\/usr\/local\/opt\// {print $1}')
              done
              if [ "$added" -eq 0 ]; then
                break
              fi
            done

            for libfile in *.dylib; do
              # Ensure each library has the correct ID
              install_name_tool -id "@loader_path/$libfile" "$libfile" || true

              # Fix internal boost and tbb dependencies within the dylibs themselves
              for dep in program_options filesystem iostreams system thread chrono date_time regex random atomic container; do
                install_name_tool -change "/opt/homebrew/opt/boost/lib/libboost_${dep}.dylib" "@loader_path/libboost_${dep}.dylib" "$libfile" || true
                install_name_tool -change "/usr/local/opt/boost/lib/libboost_${dep}.dylib" "@loader_path/libboost_${dep}.dylib" "$libfile" || true
              done
              install_name_tool -change "/opt/homebrew/opt/tbb/lib/libtbb.12.dylib" "@loader_path/libtbb.12.dylib" "$libfile" || true
              install_name_tool -change "/usr/local/opt/tbb/lib/libtbb.12.dylib" "@loader_path/libtbb.12.dylib" "$libfile" || true
              install_name_tool -change "/opt/homebrew/opt/libarchive/lib/libarchive.13.dylib" "@loader_path/libarchive.13.dylib" "$libfile" || true
              install_name_tool -change "/usr/local/opt/libarchive/lib/libarchive.13.dylib" "@loader_path/libarchive.13.dylib" "$libfile" || true
              install_name_tool -change "/opt/homebrew/opt/lua@5.4/lib/liblua.dylib" "@loader_path/liblua.dylib" "$libfile" || true
              install_name_tool -change "/usr/local/opt/lua@5.4/lib/liblua.dylib" "@loader_path/liblua.dylib" "$libfile" || true
            done
            for libfile in *.dylib; do
              codesign --force --sign - "$libfile" || true
            done
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              if [ -f "$exe" ]; then
                codesign --force --sign - "$exe" || true
              fi
            done
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              if otool -L "$exe" | grep -E "/opt/homebrew|/usr/local/opt"; then
                echo "Unpackaged Homebrew dependency found in $exe"
                exit 1
              fi
            done
            for libfile in *.dylib; do
              if otool -L "$libfile" | grep -E "/opt/homebrew|/usr/local/opt"; then
                echo "Unpackaged Homebrew dependency found in $libfile"
                exit 1
              fi
            done
            shopt -u nullglob
            cd ../..
          fi

          # Bundle TBB, Boost and patch RPATH for Linux
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get install -y patchelf
            cp /usr/lib/*/libtbb.so* package/${{ matrix.artifact_name }}/ 2>/dev/null || true
            cp /usr/lib/*/libboost_{program_options,filesystem,iostreams,system,thread,chrono,date_time,regex,random,atomic,container}.so* package/${{ matrix.artifact_name }}/ 2>/dev/null || true
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              patchelf --set-rpath '$ORIGIN' package/${{ matrix.artifact_name }}/$exe
              deps="$(ldd "package/${{ matrix.artifact_name }}/$exe")"
              echo "$deps"
              if echo "$deps" | grep "not found"; then
                echo "Missing dynamic library in $exe"
                exit 1
              fi
              unpackaged_deps="$(echo "$deps" | grep -E "lib(boost_|tbb)" | grep -F -v "$(pwd)/package/${{ matrix.artifact_name }}/" || true)"
              if [ -n "$unpackaged_deps" ]; then
                echo "Unpackaged Boost/TBB dependency found in $exe"
                echo "$unpackaged_deps"
                exit 1
              fi
            done
          fi

          for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
            test -x "package/${{ matrix.artifact_name }}/$exe"
          done
          test -d "package/${{ matrix.artifact_name }}/profiles"

          cd package
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "package/${{ matrix.artifact_name }}"
          $exeCopied = $false
          foreach ($pattern in @("osrm-backend/build/Release/*.exe", "osrm-backend/build/*.exe")) {
            if (Test-Path $pattern) {
              Copy-Item $pattern -Destination "package/${{ matrix.artifact_name }}/"
              $exeCopied = $true
            }
          }
          if (!$exeCopied) {
            throw "No OSRM executables found after build"
          }
          foreach ($pattern in @("osrm-backend/build/Release/*.dll", "osrm-backend/build/*.dll")) {
            if (Test-Path $pattern) {
              Copy-Item $pattern -Destination "package/${{ matrix.artifact_name }}/"
            }
          }
          Copy-Item -Recurse "osrm-backend/profiles" -Destination "package/${{ matrix.artifact_name }}/"
          if (Test-Path "osrm-backend/build/vcpkg_installed/x64-windows/bin/*.dll") {
              Copy-Item "osrm-backend/build/vcpkg_installed/x64-windows/bin/*.dll" -Destination "package/${{ matrix.artifact_name }}/"
          } else {
              Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll" -Destination "package/${{ matrix.artifact_name }}/"
          }
          $expected = @("osrm-extract.exe", "osrm-routed.exe", "osrm-contract.exe", "osrm-customize.exe", "osrm-partition.exe")
          foreach ($exe in $expected) {
            if (!(Test-Path "package/${{ matrix.artifact_name }}/$exe")) {
              throw "Missing expected executable: $exe"
            }
          }
          $dllCount = @(Get-ChildItem "package/${{ matrix.artifact_name }}" -Filter "*.dll").Count
          if ($dllCount -eq 0) {
            throw "No DLLs were bundled into the Windows package"
          }
          cd package
          tar -czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/${{ matrix.artifact_name }}.tar.gz
          retention-days: 7


  test:
    name: Test ${{ matrix.arch }} on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-linux-x64-Release
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact_name: osrm-${{ inputs.version_tag }}-linux-arm64-Release
          - os: macos-15
            arch: arm64
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-arm64-Release
          - os: macos-15-intel
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-darwin-x64-Release
          - os: windows-2022
            arch: x64
            artifact_name: osrm-${{ inputs.version_tag }}-win32-x64-Release

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: download-dir

      - name: Extract Artifact
        run: |
          cd download-dir
          tar -xzf ${{ matrix.artifact_name }}.tar.gz

      - name: Dependency Audit & Run Sanity Checks (Unix)
        if: runner.os != 'Windows'
        run: |
          cd download-dir/${{ matrix.artifact_name }}
          echo "Running dependency audits..."
          if [ "$RUNNER_OS" == "Linux" ]; then
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              deps="$(ldd "./$exe")"
              echo "$deps"
              if echo "$deps" | grep "not found"; then
                echo "Missing dynamic library in $exe"
                exit 1
              fi
              unpackaged_deps="$(echo "$deps" | grep -E "lib(boost_|tbb)" | grep -F -v "$PWD/" || true)"
              if [ -n "$unpackaged_deps" ]; then
                echo "Unpackaged Boost/TBB dependency found in $exe"
                echo "$unpackaged_deps"
                exit 1
              fi
            done
          elif [ "$RUNNER_OS" == "macOS" ]; then
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              if otool -L $exe | grep -E "/opt/homebrew|/usr/local/opt"; then
                echo "Unpackaged Homebrew dependency found in $exe"
                exit 1
              fi
            done
            for lib in *.dylib; do
              if otool -L $lib | grep -E "/opt/homebrew|/usr/local/opt"; then
                echo "Unpackaged Homebrew dependency found in $lib"
                exit 1
              fi
            done
          fi
          echo "Audits passed."

          echo "Testing all shipped executables..."
          for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
             ./$exe --version
          done

      - name: Run Sanity Checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd download-dir\${{ matrix.artifact_name }}
          $packageDir = (Get-Location).Path
          $env:PATH = "$packageDir;$env:SystemRoot\System32;$env:SystemRoot"
          Write-Host "Testing all shipped executables..."
          .\osrm-extract.exe --version
          .\osrm-routed.exe --version
          .\osrm-contract.exe --version
          .\osrm-customize.exe --version
          .\osrm-partition.exe --version


  release:
    name: Publish Release
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "osrm-${{ inputs.version_tag }}-linux-x64-Release"
            "osrm-${{ inputs.version_tag }}-linux-arm64-Release"
            "osrm-${{ inputs.version_tag }}-darwin-arm64-Release"
            "osrm-${{ inputs.version_tag }}-darwin-x64-Release"
            "osrm-${{ inputs.version_tag }}-win32-x64-Release"
          )
          artifact_count="$(find artifacts -mindepth 2 -maxdepth 2 -name '*.tar.gz' | wc -l | tr -d ' ')"
          if [ "$artifact_count" -ne "${#expected[@]}" ]; then
            echo "Expected ${#expected[@]} release archives, found $artifact_count"
            find artifacts -mindepth 1 -maxdepth 3 -type f -print
            exit 1
          fi
          for artifact in "${expected[@]}"; do
            archive="artifacts/$artifact/$artifact.tar.gz"
            if [ ! -f "$archive" ]; then
              echo "Missing expected release archive: $archive"
              exit 1
            fi
            tar -tzf "$archive" > /tmp/archive-list.txt
            for exe in osrm-extract osrm-routed osrm-contract osrm-customize osrm-partition; do
              if ! grep -Fxq "$artifact/$exe" /tmp/archive-list.txt && ! grep -Fxq "$artifact/$exe.exe" /tmp/archive-list.txt; then
                echo "Archive $archive is missing $exe"
                exit 1
              fi
            done
          done

      - name: Generate Checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec shasum -a 256 {} + | sed 's|^\([a-f0-9]*\)  .*/\([^/]*\)$|\1  \2|' > checksums.txt
          cat checksums.txt

      - name: Generate Release Notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.version_tag || github.ref_name }}"
          upstream_published_at="$(python3 - "$tag" <<'PY'
          import datetime
          import json
          import sys
          import urllib.request

          tag = sys.argv[1]
          url = f"https://api.github.com/repos/Project-OSRM/osrm-backend/releases/tags/{tag}"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "osrm-binaries-release-workflow",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  published_at = json.load(response).get("published_at", "")
              dt = datetime.datetime.fromisoformat(published_at.replace("Z", "+00:00"))
              print(dt.strftime("%Y-%m-%d %H:%M UTC"))
          except Exception:
              print("unknown")
          PY
          )"
          cat > release-notes.md <<EOF
          OSRM backend binaries built from upstream OSRM ${tag}.

          Original upstream OSRM release date: ${upstream_published_at}

          Upstream OSRM release notes and source tag:
          https://github.com/Project-OSRM/osrm-backend/releases/tag/${tag}

          This release includes standalone archives for Linux, macOS, and Windows. SHA-256 checksums are available in \`checksums.txt\` and as GitHub release asset digests.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version_tag != ''
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums.txt
          fail_on_unmatched_files: true
